title: Sobre Mim
description: Engenheiro Frontend Sênior especializado no ecossistema Vue e Nuxt.
content: |
  Olá, sou **Daniel Marchi**, um desenvolvedor web especializado na construção de aplicações modernas e de alta performance. Passei os últimos anos profundamente imerso no ecossistema Vue e Nuxt, ajudando empresas e desenvolvedores a criar experiências web melhores.

  Minha abordagem combina precisão técnica com foco na experiência do usuário. Sou especialista em construir arquiteturas frontend escaláveis, otimizar performance de renderização e garantir acessibilidade em todas as plataformas.

  ### Minha Filosofia

  Acredito que um ótimo software é construído na interseção entre **performance** e **manutenibilidade**. Meu processo envolve pesquisa técnica profunda e o compromisso de usar as melhores ferramentas para cada trabalho, seja Nuxt 3, TypeScript ou Tailwind CSS.

  Busco criar interfaces que pareçam fluidas, onde a funcionalidade e a estética caminham juntas. Meu foco é entregar código robusto pronto para ambientes de produção.

  ### Além do Código

  Quando não estou arquitetando aplicações web, costumo contribuir para a comunidade open-source ou acompanhar as últimas tendências no ecossistema JavaScript.

  Obrigado por passar por aqui. Sinta-se à vontade para navegar pelos meus [projetos](/projects) ou [entrar em contato](/contact) se quiser colaborar!
