skills: |
  Sou um **Engenheiro Frontend Sênior** apaixonado por construir aplicações web de alta performance. Minha expertise reside no **ecossistema Vue e Nuxt**, onde me especializo em criar arquiteturas escaláveis e interfaces de usuário premium.

  ### Competências Principais
  - **Arquitetura**: Sistemas frontend escaláveis e sustentáveis.
  - **Performance**: SSR, otimização de hidratação e Core Web Vitals.
  - **Acessibilidade**: HTML semântico e melhores práticas ARIA.
